<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<title>Payvex — Intelligent Payment Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,400;1,600&family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0d0d0a;
    --ink-deep: #080807;
    --surface: #141410;
    --surface-raised: #1c1c18;
    --border: rgba(255,170,51,0.10);
    --border-bright: rgba(255,170,51,0.20);
    --text: #fff8ec;
    --muted: #9e9080;
    --accent: #FFAA33;
    --accent-dim: rgba(255,170,51,0.12);
    --accent-glow: rgba(255,170,51,0.4);
    --gold: #FFD580;
    --gold-dim: rgba(255,213,128,0.1);
    --blue: #FF8C00;
    --blue-dim: rgba(255,140,0,0.1);
    --radius: 14px;
    --radius-lg: 22px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--ink);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--ink-deep); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

</style>
</head>
<body>

</body>
</html>
