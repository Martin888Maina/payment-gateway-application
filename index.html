<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<title>Payvex — Intelligent Payment Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,400;1,600&family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0d0d0a;
    --ink-deep: #080807;
    --surface: #141410;
    --surface-raised: #1c1c18;
    --border: rgba(255,170,51,0.10);
    --border-bright: rgba(255,170,51,0.20);
    --text: #fff8ec;
    --muted: #9e9080;
    --accent: #FFAA33;
    --accent-dim: rgba(255,170,51,0.12);
    --accent-glow: rgba(255,170,51,0.4);
    --gold: #FFD580;
    --gold-dim: rgba(255,213,128,0.1);
    --blue: #FF8C00;
    --blue-dim: rgba(255,140,0,0.1);
    --radius: 14px;
    --radius-lg: 22px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--ink);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--ink-deep); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 900;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px;
    height: 72px;
    background: rgba(8,8,7,0.7);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Playfair Display', serif;
    font-weight: 800; font-size: 1.35rem;
    color: var(--text); text-decoration: none; letter-spacing: -0.02em;
  }
  .nav-logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), #cc6600);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 800; color: var(--ink);
  }
  .nav-links {
    display: flex; align-items: center; gap: 36px;
    list-style: none;
  }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 0.875rem; font-weight: 500;
    letter-spacing: 0.01em;
    transition: color 0.2s;
    position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 1px; background: var(--accent);
    transition: width 0.25s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta { display: flex; align-items: center; gap: 12px; }
  .btn-ghost {
    padding: 9px 20px; border-radius: 8px;
    border: 1px solid var(--border-bright);
    background: transparent; color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-ghost:hover { border-color: var(--accent); background: var(--accent-dim); }
  .btn-primary {
    padding: 9px 22px; border-radius: 8px;
    background: var(--accent); color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; font-weight: 700;
    border: none; cursor: pointer; text-decoration: none;
    transition: box-shadow 0.25s, transform 0.15s;
  }
  .btn-primary:hover { box-shadow: 0 0 28px var(--accent-glow); transform: translateY(-1px); }

  /* ─── HAMBURGER ─── */
  .nav-hamburger {
    display: none;
    flex-direction: column; justify-content: center; gap: 5px;
    width: 40px; height: 40px;
    background: transparent; border: 1px solid var(--border-bright);
    border-radius: 8px; cursor: pointer; padding: 8px;
  }
  .nav-hamburger span {
    display: block; height: 1.5px; width: 100%;
    background: var(--text); border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }
  .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-hamburger.open span:nth-child(2) { opacity: 0; }
  .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* ─── MOBILE DRAWER ─── */
  .mobile-drawer {
    position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
    background: rgba(8,8,7,0.97);
    backdrop-filter: blur(20px);
    z-index: 850;
    display: flex; flex-direction: column;
    padding: 32px 24px 40px;
    gap: 8px;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    border-top: 1px solid var(--border);
    overflow-y: auto;
  }
  .mobile-drawer.open { transform: translateX(0); }
  .mobile-drawer a {
    display: block;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700;
    color: var(--text); text-decoration: none;
    transition: color 0.2s, padding-left 0.2s;
  }
  .mobile-drawer a:hover { color: var(--accent); padding-left: 8px; }
  .mobile-drawer .drawer-cta {
    margin-top: 24px; display: flex; flex-direction: column; gap: 12px;
  }
  .mobile-drawer .drawer-cta a {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    padding: 14px 24px; text-align: center;
    border-bottom: none;
  }
  .mobile-drawer .drawer-cta .btn-ghost { border-radius: 8px; }

  @media (max-width: 900px) {
    .nav-links, .nav-cta { display: none; }
    .nav-hamburger { display: flex; }
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background: var(--ink-deep);
    background-image: url('meeting');
    background-size: cover;
    background-position: center;
  }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(13,13,10,0.92) 0%, rgba(60,30,5,0.85) 50%, rgba(13,13,10,0.92) 100%);
  }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.18;
    animation: breathe 8s ease-in-out infinite alternate;
  }
  .blob-1 { width: 700px; height: 500px; background: #ff9500; top: -120px; left: -200px; animation-delay: 0s; }
  .blob-2 { width: 500px; height: 500px; background: #ffb347; top: 100px; right: -150px; animation-delay: 2s; }
  .blob-3 { width: 400px; height: 400px; background: #cc6600; bottom: 0; left: 30%; animation-delay: 4s; }
  @keyframes breathe {
    from { transform: scale(1) translate(0,0); }
    to   { transform: scale(1.12) translate(20px,-30px); }
  }
  .hero-grid {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 40%, transparent 100%);
  }
  .hero-content { position: relative; z-index: 2; max-width: 900px; }

</style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav id="navbar">
  <a href="#" class="nav-logo">
    <div class="nav-logo-mark">P</div>
    Payvex
  </a>
  <ul class="nav-links">
    <li><a href="#solutions">Solutions</a></li>
    <li><a href="#features">Features</a></li>
    <li><a href="#developers">Developers</a></li>
    <li><a href="#pricing">Pricing</a></li>
    <li><a href="#company">Company</a></li>
  </ul>
  <div class="nav-cta">
    <a href="#" class="btn-ghost">Sign in</a>
    <a href="#" class="btn-primary">Get started</a>
  </div>
  <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ─── MOBILE DRAWER ─── -->
<div class="mobile-drawer" id="mobileDrawer">
  <a href="#solutions" onclick="closeDrawer()">Solutions</a>
  <a href="#features" onclick="closeDrawer()">Features</a>
  <a href="#developers" onclick="closeDrawer()">Developers</a>
  <a href="#pricing" onclick="closeDrawer()">Pricing</a>
  <a href="#company" onclick="closeDrawer()">Company</a>
  <div class="drawer-cta">
    <a href="#" class="btn-ghost">Sign in</a>
    <a href="#" class="btn-primary">Get started</a>
  </div>
</div>

<!-- ─── HERO ─── -->
<div class="hero">
  <div class="hero-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="hero-grid"></div>
  </div>
  <div class="hero-content">
  </div>
</div>

<script>
  // ─── HAMBURGER / MOBILE DRAWER ───
  const hamburger = document.getElementById('hamburger');
  const mobileDrawer = document.getElementById('mobileDrawer');

  hamburger.addEventListener('click', () => {
    const isOpen = mobileDrawer.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });

  function closeDrawer() {
    mobileDrawer.classList.remove('open');
    hamburger.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('click', e => {
    if (mobileDrawer.classList.contains('open') &&
        !mobileDrawer.contains(e.target) &&
        !hamburger.contains(e.target)) {
      closeDrawer();
    }
  });
</script>

</body>
</html>
